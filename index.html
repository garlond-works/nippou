<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作業日報書 - 編集・印刷システム</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    :root {
      /* 実際の用紙に近いインクブルー */
      --form-blue: #0066b3;
      --bg-color: #f0f2f5;
      --paper-width: 210mm;
      --paper-height: 297mm;
    }

    body {
      background-color: var(--bg-color);
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* 操作パネル */
    .controls {
      background: white;
      padding: 15px 30px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      margin-bottom: 20px;
      display: flex;
      gap: 15px;
      position: sticky;
      top: 10px;
      z-index: 100;
      width: 100%;
      max-width: 600px;
      box-sizing: border-box;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14px;
      flex: 1;
    }

    .btn-edit {
      background-color: #4a5568;
      color: white;
    }

    .btn-print {
      background-color: #3182ce;
      color: white;
    }

    .btn-pdf {
      background-color: #e53e3e;
      color: white;
    }

    button:hover {
      opacity: 0.8;
      transform: translateY(-1px);
    }

    /* スケーリング用ラッパー */
    #page-wrapper {
      margin: 0 auto;
      overflow: hidden;
    }

    /* A4用紙設定 (レスポンシブ対応) */
    .page {
      width: var(--paper-width);
      /* PC・スマホ共通でA4サイズに固定し、スマホではJSで縮小(scale)させる */
      height: var(--paper-height);
      background: white;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.15);
      padding: 15mm;
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transform-origin: top left;
    }

    /* フォーム全体を囲む外枠 */
    .form-wrapper {
      border: 1.5px solid var(--form-blue);
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      color: #333;
    }

    /* テーブル共通設定 */
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    td,
    th {
      border: 1px solid var(--form-blue);
      padding: 4px 8px;
      font-size: 14px;
      vertical-align: middle;
    }

    /* テーブル外周の線を消してwrapperの線を生かす */
    table {
      border-left: none;
      border-right: none;
    }

    table td:first-child,
    table th:first-child {
      border-left: none;
    }

    table td:last-child,
    table th:last-child {
      border-right: none;
    }

    table tr:first-child td,
    table tr:first-child th {
      border-top: none;
    }

    /* テーブル同士の結合部の二重線防止 */
    .table-2,
    .table-3 {
      margin-top: -1px;
    }

    /* 入力エリア */
    .editable {
      outline: none;
      min-height: 1.5em;
      line-height: 1.5em;
      word-wrap: break-word;
    }

    .edit-mode .editable {
      background-color: #f0f8ff;
      border-radius: 2px;
      padding: 0 4px;
    }

    .edit-mode .editable:focus {
      background-color: #e1f0fc;
      box-shadow: 0 0 0 1px #8ab4f8;
    }

    /* カラム幅設定 (PCベース) */
    .col-h1 {
      width: 14%;
    }

    .col-h2 {
      width: 10%;
    }

    .col-h3 {
      width: 11%;
    }

    .col-h4 {
      width: 40%;
    }

    .col-h5 {
      width: 10%;
    }

    .col-h6 {
      width: 15%;
    }

    .col-w1 {
      width: 22%;
    }

    .col-w2 {
      width: 46%;
    }

    .col-w3 {
      width: 7%;
    }

    .col-w4 {
      width: 25%;
    }

    .col-d1 {
      width: 75%;
    }

    .col-d2 {
      width: 25%;
    }

    /* ヘッダーテーブル (Table 1) */
    .header-table td {
      height: 32px;
    }

    .title-text {
      font-size: 22px;
      font-weight: bold;
      text-align: center;
    }

    .date-section {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    .date-input {
      width: 30px;
      text-align: left;
    }

    /* 作業員テーブル (Table 2) */
    .worker-table th {
      font-weight: normal;
      text-align: center;
      letter-spacing: 0.1em;
      height: 28px;
    }

    .worker-table td {
      height: 35px;
    }

    .time-box {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 10px;
    }

    .time-input {
      width: 40%;
      text-align: left;
    }

    /* 危険ポイントテーブル (Table 3) */
    .danger-table td {
      height: 35px;
    }

    .danger-title {
      text-align: center;
      letter-spacing: 0.6em;
      font-size: 15px;
    }

    .confirm-title {
      text-align: center;
      letter-spacing: 0.2em;
      font-size: 14px;
    }

    /* 連絡事項エリア */
    .memo-section {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      padding: 10px 15px;
      border-top: 1px solid var(--form-blue);
      margin-top: -1px;
    }

    .memo-title {
      font-size: 14px;
      margin-bottom: 5px;
    }

    .memo-content {
      flex-grow: 1;
      vertical-align: top;
    }

    /* フッター */
    .footer-info {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      font-size: 13px;
      line-height: 1.4;
      color: #222;
    }

    .slogan {
      text-align: left;
      letter-spacing: 0.05em;
    }

    .company-meta {
      text-align: right;
      font-family: "MS PGothic", "Hiragino Kaku Gothic ProN", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .company-name-row {
      display: flex;
      align-items: center;
      margin-bottom: 4px;
    }

    .company-name {
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 0.1em;
    }

    .contact-info {
      letter-spacing: 0.1em;
      font-size: 14px;
    }


    /* スマホ・タブレット向けレスポンシブ対応 */
    @media screen and (max-width: 860px) {
      body {
        padding: 10px 5px;
      }

      .controls {
        padding: 10px;
        gap: 8px;
        max-width: 100%;
        flex-wrap: wrap;
        justify-content: center;
      }

      button {
        font-size: 13px;
        padding: 10px 14px;
        flex: 1 1 auto;
        min-width: 80px;
      }

      /* JS scaling で対応するため page 自体はそのまま */
      .page {
        transform-origin: top center;
      }
    }

    /* 印刷用設定 */
    @media print {
      body {
        background: none;
        padding: 0;
      }

      .controls {
        display: none !important;
      }

      .page {
        box-shadow: none;
        margin: 0;
        padding: 15mm !important;
        width: 210mm !important;
        height: 297mm !important;
        max-width: none !important;
        aspect-ratio: auto !important;
        page-break-after: avoid;
      }

      td,
      th {
        font-size: 14px !important;
        padding: 4px 8px !important;
      }

      .title-text {
        font-size: 22px !important;
      }

      .danger-title {
        font-size: 15px !important;
        letter-spacing: 0.6em !important;
      }

      .edit-mode .editable {
        background-color: transparent !important;
      }

      /* 印刷時は必ず元の比率に戻す */
      .col-h1 {
        width: 14% !important;
      }

      .col-h2 {
        width: 10% !important;
      }

      .col-h3 {
        width: 11% !important;
      }

      .col-h4 {
        width: 40% !important;
      }

      .col-h5 {
        width: 10% !important;
      }

      .col-h6 {
        width: 15% !important;
      }

      .col-w1 {
        width: 22% !important;
      }

      .col-w2 {
        width: 46% !important;
      }

      .col-w3 {
        width: 7% !important;
      }

      .col-w4 {
        width: 25% !important;
      }

      .col-d1 {
        width: 75% !important;
      }

      .col-d2 {
        width: 25% !important;
      }
    }
  </style>
</head>

<body class="edit-mode">

  <!-- 操作パネル -->
  <div class="controls">
    <button class="btn-edit" onclick="toggleEdit()">
      <span id="edit-icon">👁️</span> <span id="edit-text">プレビュー</span>
    </button>
    <button class="btn-print" onclick="window.print()">
      🖨️ 印刷
    </button>
    <button class="btn-pdf" onclick="saveAsPDF()">
      📄 PDF保存
    </button>
  </div>

  <!-- 帳票エリア -->
  <div id="page-wrapper">
    <div id="capture-area" class="page">
      <div class="form-wrapper">

      <!-- Table 1: ヘッダー情報 -->
      <table class="header-table">
        <colgroup>
          <col class="col-h1">
          <col class="col-h2">
          <col class="col-h3">
          <col class="col-h4">
          <col class="col-h5">
          <col class="col-h6">
        </colgroup>
        <tr>
          <td colspan="3" style="text-align: center;">
            <div class="date-section">
              <span class="editable date-input" contenteditable="true" style="width: 40px;"></span> 年
              <span class="editable date-input" contenteditable="true"></span> 月
              <span class="editable date-input" contenteditable="true"></span> 日
            </div>
          </td>
          <td class="title-text">作 業 日 報 書</td>
          <td style="text-align: center; font-size: 13px;">責任者</td>
          <td>
            <div class="editable" contenteditable="true" style="width: 100%; text-align: left;"></div>
          </td>
        </tr>
        <tr>
          <td colspan="4">
            <div style="display: flex; align-items: center;">
              <div class="editable" contenteditable="true" style="flex-grow: 1; text-align: left;"></div>
              <span style="white-space: nowrap; margin-left: 10px; margin-right: 5px;">殿</span>
            </div>
          </td>
          <td style="text-align: center; font-size: 13px;">監督名</td>
          <td style="position: relative;">
            <div class="editable" contenteditable="true"
              style="width: 100%; text-align: left; padding-right: 15px; box-sizing: border-box;"></div>
            <span style="position: absolute; bottom: 4px; right: 8px; pointer-events: none;">印</span>
          </td>
        </tr>
        <tr>
          <td style="text-align: center; letter-spacing: 0.2em;">現場名</td>
          <td colspan="5">
            <div class="editable" contenteditable="true" style="width: 100%; text-align: left;"></div>
          </td>
        </tr>
      </table>

      <!-- Table 2: 作業員リスト -->
      <table class="worker-table table-2">
        <colgroup>
          <col class="col-w1">
          <col class="col-w2">
          <col class="col-w3">
          <col class="col-w4">
        </colgroup>
        <tr>
          <th>作 業 員 名</th>
          <th>作　業　内　容</th>
          <th>健康</th>
          <th>作 業 時 間</th>
        </tr>
        <!-- 8行分のデータ枠 -->
        <script>
          for (let i = 0; i < 8; i++) {
            document.write(`
                            <tr>
                                <td><div class="editable" contenteditable="true" style="width: 100%; text-align: left;"></div></td>
                                <td><div class="editable" contenteditable="true" style="width: 100%; text-align: left;"></div></td>
                                <td><div class="editable" contenteditable="true" style="width: 100%; text-align: left;"></div></td>
                                <td>
                                    <div class="time-box">
                                        <div class="editable time-input" contenteditable="true"></div>
                                        <div>～</div>
                                        <div class="editable time-input" contenteditable="true"></div>
                                    </div>
                                </td>
                            </tr>
                        `);
          }
        </script>
      </table>

      <!-- Table 3: 危険ポイント -->
      <table class="danger-table table-3">
        <colgroup>
          <col class="col-d1">
          <col class="col-d2">
        </colgroup>
        <tr>
          <td class="danger-title">本 日 の 危 険 ポ イ ン ト</td>
          <td class="confirm-title">確 認</td>
        </tr>
        <tr>
          <td>
            <div class="editable" contenteditable="true" style="width: 100%; text-align: left;"></div>
          </td>
          <td>
            <div class="editable" contenteditable="true" style="width: 100%; text-align: left;"></div>
          </td>
        </tr>
        <tr>
          <td>
            <div class="editable" contenteditable="true" style="width: 100%; text-align: left;"></div>
          </td>
          <td>
            <div class="editable" contenteditable="true" style="width: 100%; text-align: left;"></div>
          </td>
        </tr>
        <tr>
          <td>
            <div class="editable" contenteditable="true" style="width: 100%; text-align: left;"></div>
          </td>
          <td>
            <div class="editable" contenteditable="true" style="width: 100%; text-align: left;"></div>
          </td>
        </tr>
      </table>

      <!-- 連絡事項エリア -->
      <div class="memo-section">
        <div class="memo-title">◎連絡事項</div>
        <div class="editable memo-content" contenteditable="true"></div>
      </div>

    </div>

    <!-- フッター情報 -->
    <div class="footer-info">
      <div class="slogan">
        奉仕の心をモットーに<br>
        建設現場0災害を達成し、<br>
        社会に貢献する。
      </div>
      <div class="company-meta">
        <div class="company-name-row">
          <!-- SVGによるロゴマーク再現 -->
          <svg width="28" height="34" viewBox="0 0 24 30" style="margin-right: 8px;">
            <rect x="2" y="1" width="1.5" height="20" fill="#0066b3" />
            <circle cx="8" cy="11" r="2" fill="#0066b3" />
            <path d="M 14 1 L 22 1 L 18 11 L 22 21 L 14 21 L 18 11 Z" fill="none" stroke="#0066b3" stroke-width="1.2"
              stroke-linejoin="round" />
            <text x="12" y="28" font-size="6.5" font-family="sans-serif" fill="#0066b3" text-anchor="middle"
              font-weight="bold">HOKEN</text>
          </svg>
          <span class="company-name">(株)奉建社</span>
        </div>
        <div class="contact-info">
          TEL 048(965)2555<br>
          FAX 048(965)2888
        </div>
      </div>
    </div>
  </div>
  </div>

  <script>
    let isEditMode = true;

    // 編集モード切替機能
    function toggleEdit() {
      isEditMode = !isEditMode;
      const btnText = document.getElementById('edit-text');
      const btnIcon = document.getElementById('edit-icon');
      const editables = document.querySelectorAll('.editable');

      if (isEditMode) {
        document.body.classList.add('edit-mode');
        btnText.innerText = "プレビュー";
        btnIcon.innerText = "👁️";
        editables.forEach(el => el.contentEditable = "true");
      } else {
        document.body.classList.remove('edit-mode');
        btnText.innerText = "編集";
        btnIcon.innerText = "✏️";
        editables.forEach(el => el.contentEditable = "false");
      }
    }

    // 画面幅に合わせてページをスケーリング
    function scalePageToFit() {
      const wrapper = document.getElementById('page-wrapper');
      const page = document.getElementById('capture-area');
      // 一旦スケールをリセットして正しい元の幅を取得する
      page.style.transform = '';
      wrapper.style.width = '';
      wrapper.style.height = '';
      
      const naturalWidth = page.offsetWidth; 
      const naturalHeight = page.offsetHeight;
      const available = window.innerWidth - 20; // 余白分
      if (naturalWidth > 0 && available < naturalWidth) {
        const scale = available / naturalWidth;
        page.style.transform = `scale(${scale})`;
        
        wrapper.style.width = `${naturalWidth * scale}px`;
        wrapper.style.height = `${naturalHeight * scale}px`;
      }
    }
    window.addEventListener('load', scalePageToFit);
    window.addEventListener('resize', scalePageToFit);

    // PDF保存機能（1ページ収容の確実化＋スマホでもPCサイズで出力）
    async function saveAsPDF() {
      const element = document.getElementById('capture-area');

      // 編集モード特有の背景色などを一時的に解除
      const wasEditMode = isEditMode;
      if (isEditMode) {
        document.body.classList.remove('edit-mode');
      }

      // PDF化の瞬間だけ強制的にA4の絶対サイズを適用（スマホでのレイアウト崩れを防ぐ）
      const wrapper = document.getElementById('page-wrapper');
      const originalWrapperWidth = wrapper.style.width;
      const originalWrapperHeight = wrapper.style.height;
      wrapper.style.width = '';
      wrapper.style.height = '';

      const originalWidth = element.style.width;
      const originalMaxWidth = element.style.maxWidth;
      const originalHeight = element.style.height;
      const originalAspectRatio = element.style.aspectRatio;
      const originalPadding = element.style.padding;
      const originalTransform = element.style.transform;
      const originalMarginBottom = element.style.marginBottom;

      element.style.width = '210mm';
      element.style.maxWidth = 'none';
      element.style.height = '296.5mm';
      element.style.aspectRatio = 'auto';
      element.style.padding = '15mm';
      element.style.transform = '';
      element.style.marginBottom = '';

      const opt = {
        margin: 0,
        filename: '作業日報書.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        // windowWidth: 1200を指定することで、スマホで操作しても常にPC版のレイアウトでPDF化される
        html2canvas: { scale: 2, useCORS: true, logging: false, windowWidth: 1200 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };

      try {
        await html2pdf().set(opt).from(element).save();
      } catch (error) {
        console.error("PDF生成に失敗しました:", error);
        alert("PDFの生成に失敗しました。");
      } finally {
        // スタイルを元のレスポンシブな状態に戻す
        element.style.width = originalWidth;
        element.style.maxWidth = originalMaxWidth;
        element.style.height = originalHeight;
        element.style.aspectRatio = originalAspectRatio;
        element.style.padding = originalPadding;
        element.style.transform = originalTransform;
        element.style.marginBottom = originalMarginBottom;

        wrapper.style.width = originalWrapperWidth;
        wrapper.style.height = originalWrapperHeight;

        if (wasEditMode) {
          document.body.classList.add('edit-mode');
        }
      }
    }
  </script>
</body>

</html>
